name: Security Audit

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"    # every Monday 6am — catch new CVEs in dependencies

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
