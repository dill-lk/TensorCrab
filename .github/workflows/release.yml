name: Release

on:
  push:
    tags:
      - "v*.*.*"       # triggers on v0.1.0, v1.2.3 etc

jobs:
  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the version-bump commit back
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Bump version in Cargo.toml
        run: |
          sed -i 's/^version = ".*"/version = "${{ steps.version.outputs.VERSION }}"/' \
            crates/tensor-crab/Cargo.toml

      - name: Commit and push version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add crates/tensor-crab/Cargo.toml
          git diff --staged --quiet || \
            git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          git push origin HEAD:main

      - name: Verify tests pass
        run: cargo test --all

      - name: Verify clippy clean
        run: cargo clippy --all-targets -- -D warnings

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CRATES_IO_TOKEN }}
        working-directory: crates/tensor-crab
