# TensorCrab PR Auto Labeler
# Automatically tags PRs based on which files changed

"tensor":
  - changed-files:
    - any-glob-to-any-file: "crates/tensor-crab/src/tensor/**"

"autograd":
  - changed-files:
    - any-glob-to-any-file: "crates/tensor-crab/src/autograd/**"

"nn":
  - changed-files:
    - any-glob-to-any-file: "crates/tensor-crab/src/nn/**"

"optimizer":
  - changed-files:
    - any-glob-to-any-file: "crates/tensor-crab/src/optim/**"

"wasm":
  - changed-files:
    - any-glob-to-any-file: "crates/tensor-crab-wasm/**"

"docs":
  - changed-files:
    - any-glob-to-any-file:
      - "docs/**"
      - "*.md"
      - ".github/**/*.md"

"ci":
  - changed-files:
    - any-glob-to-any-file: ".github/workflows/**"

"dependencies":
  - changed-files:
    - any-glob-to-any-file:
      - "**/Cargo.toml"
      - "**/Cargo.lock"

"tests":
  - changed-files:
    - any-glob-to-any-file:
      - "tests/**"
      - "**/*_test.rs"
      - "**/tests.rs"

"benchmarks":
  - changed-files:
    - any-glob-to-any-file: "benches/**"

"examples":
  - changed-files:
    - any-glob-to-any-file: "examples/**"

"breaking-change":
  - changed-files:
    - any-glob-to-any-file: "crates/tensor-crab/src/lib.rs"
